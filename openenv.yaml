name: devkey_ai_rag
version: "1.0.0"
description: RAG-based document QA environment for AI agent training.
author: "Team Pirates"
tags:
  - openenv
  - rag
  - document-qa
tasks:
  - id: task1
    description: "Answer a question based on uploaded documents"
    grader: grade_task1
    difficulty: easy
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task2
    description: "Summarize the content of an uploaded document"
    grader: grade_task2
    difficulty: medium
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
  - id: task3
    description: "Extract key topics from a document"
    grader: grade_task3
    difficulty: hard
    max_attempts: 5
    scoring: "0.0-1.0 partial credit"
endpoints:
  - path: /reset
    method: POST
  - path: /step
    method: POST
  - path: /grader
    method: POST
  - path: /tasks
    method: GET
  - path: /health
    method: GET
runtime:
  python: "3.11"
  docker: true
