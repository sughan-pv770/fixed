<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith AI — Future of Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Abstract Glows */
        .glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            border-radius: 50%; z-index: -1; pointer-events: none;
            filter: blur(60px); opacity: 0.6;
        }
        .glow-1 { top: -200px; right: -100px; }
        .glow-2 { bottom: -200px; left: -100px; animation: drift 20s infinite alternate linear; }

        @keyframes drift {
            from { transform: translate(0,0); }
            to { transform: translate(100px, 50px); }
        }

        .page-wrapper {
            display: flex; width: 100%; max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Left branding panel */
        .brand-panel {
            width: 45%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.05));
            display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
            padding: 4rem 3rem; position: relative;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        .brand-logo { 
            font-size: 2.8rem; font-weight: 700; color: #fff; 
            margin-bottom: 0.5rem; letter-spacing: -2px; 
            display: flex; align-items: center; gap: 0.5rem;
        }
        .logo-icon {
            width: 48px; height: 48px; 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px; display: grid; place-items: center;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        .brand-logo span { color: var(--primary); }
        
        .brand-tagline { 
            color: var(--text-dim); font-size: 1.1rem; line-height: 1.6; 
            margin-top: 1rem; font-weight: 400;
        }
        
        .brand-features { margin-top: 3rem; width: 100%; }
        .feature-item { 
            display: flex; align-items: center; gap: 1rem; 
            color: var(--text-main); font-size: 0.9rem; margin-bottom: 1.25rem;
            padding: 0.75rem; border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s;
        }
        .feature-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }
        .feature-icon { 
            width: 32px; height: 32px; 
            background: rgba(99, 102, 241, 0.2); 
            color: var(--primary);
            border-radius: 8px; display: flex; align-items: center; 
            justify-content: center; font-size: 1rem; flex-shrink: 0; 
        }

        /* Right form panel */
        .form-panel { flex: 1; padding: 4rem 3.5rem; display: flex; flex-direction: column; justify-content: center; }
        .form-header { margin-bottom: 2.5rem; }
        .form-title { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .form-subtitle { font-size: 0.95rem; color: var(--text-dim); }

        .alert {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171;
            padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem;
            font-size: 0.9rem; display: flex; align-items: center; gap: 0.75rem;
        }

        .tabs { 
            display: flex; gap: 1rem; background: rgba(0,0,0,0.2); 
            padding: 0.4rem; border-radius: 14px; margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-btn {
            flex: 1; background: none; border: none; padding: 0.75rem; 
            font-size: 0.9rem; font-weight: 600; color: var(--text-dim); 
            cursor: pointer; transition: all 0.3s; border-radius: 10px;
        }
        .tab-btn.active { 
            background: var(--primary); color: #fff; 
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .tab-btn:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.05); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text-dim); margin-bottom: 0.6rem; }
        .input-wrapper { position: relative; }
        .form-group input {
            width: 100%; padding: 0.85rem 1.2rem;
            border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px;
            font-size: 0.95rem; color: #fff; outline: none;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .form-group input:focus { 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.3);
            box-shadow: 0 0 0 4px var(--primary-glow); 
        }
        .form-group input::placeholder { color: #475569; }

        .btn-submit {
            width: 100%; padding: 1rem; margin-top: 1rem;
            background: linear-gradient(135deg, var(--primary), #4f46e5); 
            border: none; border-radius: 12px;
            color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s; letter-spacing: 0.02em;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px -5px var(--primary-glow);
            filter: brightness(1.1);
        }
        .btn-submit:active { transform: translateY(0); }

        @media (max-width: 900px) {
            .brand-panel { display: none; }
            .form-panel { padding: 3rem 2rem; }
            .page-wrapper { max-width: 500px; }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="page-wrapper">
        <!-- Left Branding -->
        <div class="brand-panel">
            <div class="brand-logo">
                <div class="logo-icon">Z</div>
                Zenith<span>AI</span>
            </div>
            <div class="brand-tagline">Experience the next generation of<br>Intelligent RAG Systems.</div>
            
            <div class="brand-features">
                <div class="feature-item"><div class="feature-icon">🛡️</div> Strict Enterprise Isolation</div>
                <div class="feature-item"><div class="feature-icon">⚡</div> Ultra-Fast Vector Retrieval</div>
                <div class="feature-item"><div class="feature-icon">🤖</div> Advanced LLM Reasoning</div>
                <div class="feature-item"><div class="feature-icon">🌐</div> Developer-First API</div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="form-panel">
            <div class="form-header">
                <div class="form-title">Intelligence Unified</div>
                <div class="form-subtitle">Secure access to your private knowledge</div>
            </div>

            {% if error %}
            <div class="alert">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="tabs">
                <button class="tab-btn active" id="tab-login-btn" onclick="showTab('login', this)">Sign In</button>
                <button class="tab-btn" id="tab-register-btn" onclick="showTab('register', this)">Create Account</button>
            </div>

            <div id="login" class="tab-panel active">
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="login-username" name="username" placeholder="iamzenith" required autocomplete="username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        Launch Dashboard
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </form>
            </div>

            <div id="register" class="tab-panel">
                <form action="/register" method="POST">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <div class="input-wrapper">
                            <input type="text" id="reg-username" name="username" placeholder="Choose a handle" required autocomplete="username">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="reg-password" name="password" placeholder="Create a master key" required autocomplete="new-password">
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">
                        Secure Account
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
        if (window.location.hash === '#register') {
            showTab('register', document.getElementById('tab-register-btn'));
        }
    </script>
</body>
</html>
